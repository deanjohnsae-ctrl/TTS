<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS Files Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: #f5f5f5;
      color: #222;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      margin-bottom: 24px;
    }

    ul {
      padding-left: 20px;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      color: #0b57d0;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>TTS HTML Files</h1>
    <p>Select a file to open:</p>
    <ul>
      <li><a href="var1.html">Open var1.html</a></li>
      <li><a href="var2.html">Open var2.html</a></li>
    </ul>
  </main>
</body>
</html>
